<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DApp - Wallet Pay Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
    .row { display: flex; gap: 12px; align-items: center; }
    .qr { margin-top: 16px; }
    input, button, select { font-size: 16px; padding: 8px 10px; }
    pre { background: #f5f5f7; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h2>用户钱包内置浏览器打开的 DApp</h2>
  <div class="row">
    <label>金额(wei): <input id="amount" value="100000000000000" /></label>
    <label>资产: <select id="asset"><option>ETH</option></select></label>
    <label>链: <select id="chainId"><option value="1">Ethereum Mainnet (1)</option><option value="11155111">Sepolia (11155111)</option></select></label>
    <button id="createOrder">生成支付二维码</button>
  </div>
  <div id="orderInfo"></div>
  <canvas id="qrcanvas" class="qr"></canvas>

  <h3>钱包支付触发与回调</h3>
  <pre id="log"></pre>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script>
    const serverBase = location.origin.replace(/:\d+$/, ':8787');

    function append(msg){
      const el = document.getElementById('log');
      el.textContent += `\n${new Date().toLocaleTimeString()} ${msg}`;
    }

    document.getElementById('createOrder').onclick = async () => {
      const amount = document.getElementById('amount').value;
      const asset = document.getElementById('asset').value;
      const chainId = parseInt(document.getElementById('chainId').value, 10);
      const { data: order } = await axios.post(`${serverBase}/api/orders`, { amount, asset, chainId });
      document.getElementById('orderInfo').textContent = `订单: ${order.orderId}`;
      const uri = JSON.stringify({ t: 'order', id: order.orderId });
      QRCode.toCanvas(document.getElementById('qrcanvas'), uri, { width: 240 });

      const socket = io(serverBase);
      socket.emit('join_order', order.orderId);
      append('等待商家扫码并发起支付请求...');

      socket.on('pay_requested', async (payload) => {
        append('收到商家支付请求，尝试通过已注入的钱包发起交易');
        const pay = payload.payRequest;
        try {
          if (window.ethereum && window.ethereum.request) {
            const txHash = await window.ethereum.request({
              method: 'eth_sendTransaction',
              params: [{ to: pay.to, from: pay.from, value: pay.value, data: pay.data || '0x' }]
            });
            append('钱包已提交交易: ' + txHash);
            await axios.post(`${serverBase}/api/orders/${order.orderId}/paid`, { txHash });
          } else {
            append('未检测到 EIP-1193 钱包环境');
          }
        } catch (err) {
          append('用户拒绝或发送失败: ' + err.message);
        }
      });

      socket.on('paid', (p) => {
        append('后端确认支付，txHash=' + p.txHash);
      });
    };
  </script>
</body>
</html>

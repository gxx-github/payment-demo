version: '3.9'

services:
  qr-wallet:
    build:
      context: .
      dockerfile: Dockerfile
    image: qr-wallet:latest
    container_name: qr-wallet
    ports:
      - "41021:80"   # HTTP 映射到 41021
      - "443:443"    # HTTPS 映射到 443
    volumes:
      # Nginx 配置文件
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 证书文件
      - /data/qr-wallet/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s


